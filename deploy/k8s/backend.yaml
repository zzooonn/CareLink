apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: carelink
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: your-registry/carelink-backend:latest
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/healthcare
            - name: SPRING_DATASOURCE_USERNAME
              value: appuser
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: carelink-secrets
                  key: POSTGRES_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: carelink-secrets
                  key: JWT_SECRET
            - name: NEWS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: carelink-secrets
                  key: NEWS_API_KEY
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: carelink
spec:
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
