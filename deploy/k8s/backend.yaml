apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: carelink
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: zoonz/carelink-backend:latest
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/healthcare
            - name: SPRING_DATASOURCE_USERNAME
              value: appuser
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: carelink-secrets
                  key: POSTGRES_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: carelink-secrets
                  key: JWT_SECRET
            - name: NEWS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: carelink-secrets
                  key: NEWS_API_KEY
            - name: AI_ECG_SERVER_URL
              value: http://ai:8000/predict_window
            - name: AI_ECG_API_KEY
              valueFrom:
                secretKeyRef:
                  name: carelink-secrets
                  key: AI_API_KEY
            - name: CORS_ALLOWED_ORIGINS
              value: "http://localhost:8081,http://localhost:19006"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: carelink
spec:
  type: NodePort
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
