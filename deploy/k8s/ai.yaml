apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai
  namespace: carelink
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai
  template:
    metadata:
      labels:
        app: ai
    spec:
      containers:
        - name: ai
          image: your-registry/carelink-ai:latest
          ports:
            - containerPort: 8000
          env:
            - name: MODEL_PATH
              value: /app/models/best_model_multilabel.pth
            - name: SAMPLE_DIR
              value: /app/samples
---
apiVersion: v1
kind: Service
metadata:
  name: ai
  namespace: carelink
spec:
  selector:
    app: ai
  ports:
    - port: 8000
      targetPort: 8000
