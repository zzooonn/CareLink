name: Build & Deploy to EC2

on:
  push:
    branches: [main]
    paths:
      - "backend/healthcare-server/**"
      - "ai/**"
      - "docker-compose.yml"
      - ".github/workflows/deploy.yml"

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/zzooonn/carelink/carelink-backend
  IMAGE_AI: ghcr.io/zzooonn/carelink/carelink-ai

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      ai: ${{ steps.filter.outputs.ai }}
      deploy: ${{ steps.filter.outputs.deploy }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/healthcare-server/**'
            ai:
              - 'ai/**'
            deploy:
              - 'backend/healthcare-server/**'
              - 'ai/**'
              - 'docker-compose.yml'
              - '.github/workflows/deploy.yml'

  build-backend:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/healthcare-server
          dockerfile: ./backend/healthcare-server/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:latest
            ${{ env.IMAGE_BACKEND }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-ai:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.ai == 'true'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push AI image
        uses: docker/build-push-action@v5
        with:
          context: ./ai
          dockerfile: ./ai/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_AI }}:latest
            ${{ env.IMAGE_AI }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: [changes, build-backend, build-ai]
    if: |
      needs.changes.outputs.deploy == 'true' &&
      (needs.changes.outputs.backend != 'true' || needs.build-backend.result == 'success') &&
      (needs.changes.outputs.ai != 'true' || needs.build-ai.result == 'success')

    steps:
      - name: Checkout (for docker-compose.yml)
        uses: actions/checkout@v4

      - name: Copy docker-compose.yml to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "~/carelink"

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p ~/carelink
            cat > ~/carelink/.env << 'ENVEOF'
            DB_URL=${{ secrets.DB_URL }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRATION=${{ secrets.JWT_EXPIRATION }}
            NEWS_API_KEY=${{ secrets.NEWS_API_KEY }}
            ENVEOF

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            cd ~/carelink

            BACKEND_CHANGED='${{ needs.changes.outputs.backend }}'
            AI_CHANGED='${{ needs.changes.outputs.ai }}'

            if [ "$BACKEND_CHANGED" = "true" ] && [ "$AI_CHANGED" = "true" ]; then
              docker-compose pull backend ai
              docker-compose up -d --no-deps backend ai
            elif [ "$BACKEND_CHANGED" = "true" ]; then
              docker-compose pull backend
              docker-compose up -d --no-deps backend
            elif [ "$AI_CHANGED" = "true" ]; then
              docker-compose pull ai
              docker-compose up -d --no-deps ai
            else
              docker-compose up -d --remove-orphans
            fi

            docker image prune -f
            echo "Deploy complete"
