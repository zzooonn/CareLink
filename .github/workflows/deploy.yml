name: Build & Deploy to EC2

on:
  push:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/zzooonn/carelink/carelink-backend
  IMAGE_AI: ghcr.io/zzooonn/carelink/carelink-ai

jobs:
  # ─────────────────────────────────────────────────────────────────
  # JOB 1: 백엔드 이미지 빌드 & GHCR 푸시
  # ─────────────────────────────────────────────────────────────────
  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # GHCR 푸시 권한

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: GHCR 로그인
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # 자동 발급, 별도 설정 불필요

      - name: Docker Buildx 설정 (캐시 지원)
        uses: docker/setup-buildx-action@v3

      - name: 백엔드 이미지 빌드 & 푸시
        uses: docker/build-push-action@v5
        with:
          context: ./backend/healthcare-server
          dockerfile: ./backend/healthcare-server/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:latest
            ${{ env.IMAGE_BACKEND }}:${{ github.sha }}
          # GitHub Actions 레이어 캐시 (빌드 속도 대폭 향상)
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────
  # JOB 2: AI 서버 이미지 빌드 & GHCR 푸시
  # ─────────────────────────────────────────────────────────────────
  build-ai:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: GHCR 로그인
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: AI 서버 이미지 빌드 & 푸시
        uses: docker/build-push-action@v5
        with:
          context: ./ai
          dockerfile: ./ai/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_AI }}:latest
            ${{ env.IMAGE_AI }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────
  # JOB 3: EC2 배포 (두 빌드 완료 후 실행)
  # ─────────────────────────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: [ build-backend, build-ai ]   # 두 빌드가 모두 성공해야 실행

    steps:
      - name: 코드 체크아웃 (docker-compose.yml 전송용)
        uses: actions/checkout@v4

      - name: EC2에 docker-compose.yml 전송
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "~/carelink"

      - name: EC2 배포 실행
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # .env 파일 생성 (Secrets에서 주입)
            mkdir -p ~/carelink
            cat > ~/carelink/.env << 'ENVEOF'
            DB_URL=${{ secrets.DB_URL }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRATION=${{ secrets.JWT_EXPIRATION }}
            NEWS_API_KEY=${{ secrets.NEWS_API_KEY }}
            ENVEOF

            # GHCR 로그인 (EC2에서 pull 권한)
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            cd ~/carelink

            # 최신 이미지 pull (빌드 없음! EC2는 다운로드만)
            docker-compose pull

            # 컨테이너 재시작 (다운타임 최소화)
            docker-compose up -d --remove-orphans

            # 오래된 이미지 정리 (디스크 절약)
            docker image prune -f

            echo "배포 완료!"
