services:

  # ── PostgreSQL DB ────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: carelink-db
    environment:
      POSTGRES_DB: healthcare
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data   # 데이터 영속성
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d healthcare"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot 백엔드 ───────────────────────────────────────────
  backend:
    image: ghcr.io/zzooonn/carelink/carelink-backend:latest
    container_name: carelink-backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/healthcare
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      NEWS_API_KEY: ${NEWS_API_KEY}
    depends_on:
      db:
        condition: service_healthy   # DB 완전히 준비된 후 백엔드 시작
    restart: unless-stopped

  # ── FastAPI AI 서버 ──────────────────────────────────────────────
  ai:
    image: ghcr.io/zzooonn/carelink/carelink-ai:latest
    container_name: carelink-ai
    ports:
      - "8000:8000"
    volumes:
      - ./ai/models:/app/models
      - ./ai/data:/app/data
      - ./ai/samples:/app/samples
    environment:
      MODEL_PATH: /app/models/best_model_multilabel.pth
      SAMPLE_DIR: /app/samples
    restart: unless-stopped

volumes:
  postgres_data:   # 컨테이너 재시작해도 DB 데이터 유지
