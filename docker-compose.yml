services:
  # ── PostgreSQL DB ────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: carelink-db
    environment:
      POSTGRES_DB: healthcare
      POSTGRES_USER: ${DB_USERNAME:-appuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-apppassword}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-appuser} -d healthcare"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot 백엔드 ───────────────────────────────────────────
  backend:
    # 이미지를 사용할지, 로컬 빌드를 할지에 따라 선택하세요. 
    # 여기서는 제공된 GHCR 이미지를 우선 사용하도록 설정했습니다.
    image: ghcr.io/zzooonn/carelink/carelink-backend:latest
    container_name: carelink-backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/healthcare
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-appuser}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-apppassword}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      NEWS_API_KEY: ${NEWS_API_KEY}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ── FastAPI AI 서버 ──────────────────────────────────────────────
  ai:
    image: ghcr.io/zzooonn/carelink/carelink-ai:latest
    container_name: carelink-ai
    ports:
      - "8000:8000"
    volumes:
      - ./ai/models:/app/models
      - ./ai/data:/app/data
      - ./ai/samples:/app/samples
    environment:
      MODEL_PATH: /app/models/best_model_multilabel.pth
      SAMPLE_DIR: /app/samples
    restart: unless-stopped

volumes:
  postgres_data: